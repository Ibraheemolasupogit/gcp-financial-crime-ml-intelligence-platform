aml_risk_scoring:
  output_path: outputs/sample/aml_risk_scores.csv
  prioritised_alerts_output_path: outputs/sample/prioritised_alerts.csv
  severity_bands:
    Critical:
      min: 90
      max: 100
    High:
      min: 70
      max: 89
    Medium:
      min: 40
      max: 69
    Low:
      min: 10
      max: 39
    Info:
      min: 0
      max: 9
  scoring_weights:
    high_risk_jurisdiction_flag: 22
    structuring_pattern_flag: 18
    rapid_movement_flag: 18
    mule_activity_indicator: 20
    account_takeover_indicator: 24
    new_beneficiary_high_value_flag: 16
    round_amount_repetition_flag: 12
    is_high_value_transaction: 10
    is_cross_border_transaction: 8
    high_velocity_flag: 12
    synthetic_suspicious_context: 5
  recommended_action_thresholds:
    immediate_investigator_review: 90
    investigator_review: 70
    queue_for_monitoring: 40

network_risk_scoring:
  output_path: outputs/sample/network_risk_scores.csv
  high_risk_networks_output_path: outputs/sample/high_risk_networks.csv
  network_summary_output_path: outputs/sample/network_summary.json
  network_report_output_path: reports/sample/network_risk_report.md
  max_high_risk_networks: 100
  thresholds:
    shared_device_account_threshold: 2
    shared_beneficiary_account_threshold: 2
    large_component_threshold: 25
    suspicious_cluster_rate_threshold: 0.2
    high_risk_network_score_threshold: 70
  scoring_weights:
    shared_device: 20
    shared_beneficiary: 18
    suspicious_cluster: 20
    large_component: 10
    mule_network: 18
    high_risk_network: 14
    aml_high_or_critical: 10
    anomaly_flag: 8
