fraud_classifier:
  random_seed: 42
  test_size: 0.2
  target_column: is_suspicious
  model_type: logistic_regression
  prediction_threshold: 0.5
  input_path: data/processed/transaction_features.csv
  metrics_output_path: outputs/sample/model_metrics.json
  predictions_output_path: outputs/sample/fraud_predictions.csv
  model_card_output_path: reports/sample/model_card.md
  excluded_columns:
    - transaction_id
    - account_id
    - customer_id
    - beneficiary_id
    - device_id
    - suspicious_pattern
    - transaction_timestamp
    - currency
    - transaction_type
    - merchant_category
    - origin_country
    - destination_country
    - channel

anomaly_detection:
  anomaly_model_type: isolation_forest
  contamination: 0.08
  random_seed: 42
  input_path: data/processed/transaction_features.csv
  anomaly_scores_output_path: outputs/sample/anomaly_scores.csv
  high_risk_anomalies_output_path: outputs/sample/high_risk_anomalies.csv
  anomaly_summary_output_path: outputs/sample/anomaly_summary.json
  anomaly_report_output_path: reports/sample/anomaly_detection_report.md
  max_high_risk_anomalies: 100
  excluded_columns:
    - transaction_id
    - account_id
    - customer_id
    - beneficiary_id
    - device_id
    - suspicious_pattern
    - transaction_timestamp
    - is_suspicious
    - currency
    - transaction_type
    - merchant_category
    - origin_country
    - destination_country
    - channel

nlp_alert_triage:
  alerts_input_path: data/sample/alerts.csv
  case_notes_input_path: data/sample/case_notes.csv
  case_note_classifications_output_path: outputs/sample/nlp_case_note_classifications.csv
  alert_triage_output_path: outputs/sample/nlp_alert_triage.csv
  nlp_summary_output_path: outputs/sample/nlp_summary.json
  nlp_report_output_path: reports/sample/nlp_alert_triage_report.md
  typology_confidence_defaults:
    matched_rule: 0.9
    low_risk: 0.65
    unknown: 0.35
  typology_keywords:
    mule_account:
      - mule
      - mule-account
      - pass through
      - third-party account
    account_takeover:
      - account takeover
      - unusual access
      - credential
      - unauthorised
      - unusual device
    high_risk_jurisdiction:
      - high-risk
      - higher-risk
      - jurisdiction
      - destination country
    structuring:
      - structuring
      - round-number
      - round number
      - repeated round
    rapid_movement:
      - rapid movement
      - rapid inbound
      - outbound movement
      - short time window
    shared_device:
      - shared device
      - device reuse
      - multiple account
    shared_beneficiary:
      - shared beneficiary
      - multiple accounts paid
      - common beneficiary
    low_risk:
      - false positive
      - no suspicious
      - routine activity
